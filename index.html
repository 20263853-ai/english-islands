<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>English Islands - 6 Week English Learning</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏝️</text></svg>">
  <link rel="stylesheet" href="style.css?v=2026052903">
  <style>
    
    :root {
      --primary: #4F46E5;
      --primary-light: #818CF8;
      --accent-adult: #EC4899;
      --accent-child: #F59E0B;
      --bg-adult: #FDF2F8;
      --bg-child: #FFFBEB;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: #F8FAFC;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .page { display: none; animation: fadeIn 0.3s ease; }
    .page.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .island-card {
      transition: all 0.2s ease;
      cursor: pointer;
    }
    .island-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px -5px rgba(0,0,0,0.1);
    }

    .progress-fill {
      transition: width 0.5s ease;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
    }

    .sentence-item {
      transition: all 0.15s ease;
    }
    .sentence-item:hover {
      background: #F1F5F9;
    }
    .sentence-item.playing {
      background: #EEF2FF;
      border-left: 3px solid var(--primary);
    }
    .sentence-item.completed {
      opacity: 0.6;
    }

    @keyframes pulse-ring {
      0% { transform: scale(1); opacity: 1; }
      100% { transform: scale(1.4); opacity: 0; }
    }
    .play-btn.playing::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 2px solid var(--primary);
      animation: pulse-ring 1s ease-infinite;
    }

    .wave-bar {
      animation: wave 0.6s ease-in-out infinite;
      transform-origin: bottom;
    }
    @keyframes wave {
      0%, 100% { transform: scaleY(0.4); }
      50% { transform: scaleY(1); }
    }

    .score-badge {
      background: linear-gradient(135deg, #4F46E5, #7C3AED);
      color: white;
      font-weight: 700;
      border-radius: 12px;
      padding: 4px 12px;
      font-size: 14px;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 3px; }

    .shadow-mode .sentence-text {
      filter: blur(8px);
      user-select: none;
    }
    .shadow-mode .sentence-text.revealed {
      filter: none;
      user-select: auto;
    }
  </style>
  <meta name="theme-color" content="#4F46E5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="English Is.">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <script>
    /* === v5.4: Force clear ALL caches and old SWs === */
    var APP_VERSION = 'v5.4-2026052903';

    if ("serviceWorker" in navigator) {
      // Step 1: Kill ALL existing service workers
      navigator.serviceWorker.getRegistrations().then(function(regs) {
        return Promise.all(regs.map(function(r) { return r.unregister(); }));
      }).catch(function() {}).then(function() {
        // Step 2: Clear ALL caches
        if ('caches' in window) {
          caches.keys().then(function(names) {
            return Promise.all(names.map(function(n) { return caches.delete(n); }));
          }).catch(function() {});
        }
        // Step 3: Register new SW (network-only mode)
        navigator.serviceWorker.register("sw.js?v=2026052903");
      });
    }
  </script>
</head>
<body>
  <div id="app"></div>
  <script src="data.js?v=2026052903"></script>
  <script src="app.js?v=2026052903"></script>
</body>
</html>
